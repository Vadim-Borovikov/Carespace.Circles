<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        .circle {
            display: block;
        }
        .png {
            display: block;
            max-width: 100%;
        }
        span {
            font-family: Futura PT;
        }
        @font-face {
            font-family: Futura PT;
        }
    </style>
</head>
<body>
    <div class="circle" id="feelings-circle" ></div>
    <div class="circle" id="needs-circle"></div>

    <img class="png" id="feelings-png" />
    <img class="png" id="needs-png" />

    <script src="https://get.carrotsearch.com/circles/latest/carrotsearch.circles.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
    <script>
        var size = 1280;

        function setContainerSize(id) {
            var el = document.getElementById(id);
            el.style.width = size + "px";
            el.style.height = size + "px";
            return el;
        }

        function embed(name, dto) {
            function doEmbed() {
                embed(name, dto);
            }

            var idCircle = name + "-circle";
            var idPng = name + "-png";

            var container = setContainerSize(idCircle);

            if (!window.CarrotSearchCircles || container.clientWidth <= 0 || container.clientHeight <= 0) {
                window.setTimeout(doEmbed, 250);
                return;
            }

            function decorate(opts, params, vars) {
                vars.groupColor = params.group.gcolor;
            }

            function getImg() {
                var params = {
                    format: "image/png",
                    pixelRatio: 1
                };

                var img = window.document.getElementById(idPng);
                img.src = this.get("imageData", params);
            }

            var circleParams = {
                id: idCircle,
                groupColorDecorator: decorate,
                ringScaling: 1,
                visibleGroupCount: 8,
                angleStart: 225,
                titleBar: "inscribed",
                titleBarTextColor: "#000",
                groupFontFamily: "Futura PT",
                diameter: size,
                centerx: size / 2,
                centery: size / 2,
                ratioAspectSwap: 2,
                labelColorThreshold: 0,
                dataObject: dto,
                onRolloutComplete: getImg
            }

            new window.CarrotSearchCircles(circleParams);
        }

        function load(name) {
            function onJson(json) {
                embed(name, json);
            }

            var url = "https://raw.githubusercontent.com/Vadim-Borovikov/Carespace.Circles/main/Carespace.Circles/" + name + ".json";

            window.$.getJSON(url, onJson);
        }

        load("feelings");
        load("needs");
    </script>
</body>
</html>
